<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>∴ Brim</title>
  <style>
    html, body {
      margin: 0;
      background: #000;
      color: #0ff;
      font-family: monospace;
      height: 100%;
      overflow: hidden;
    }
    canvas, #log, #pulse, #signal {
      position: absolute;
      z-index: -1;
    }
    #pulse {
      top: 10px;
      left: 10px;
      font-size: 14px;
    }
    #signal {
      bottom: 10px;
      right: 10px;
      text-align: right;
      font-size: 12px;
    }
    #log {
      bottom: 10px;
      left: 10px;
      width: 40vw;
      height: 25vh;
      background: rgba(0,0,0,0.6);
      color: #0f0;
      padding: 0.5rem;
      border-radius: 4px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <canvas id="net"></canvas>
  <div id="pulse">↻ initializing...</div>
  <div id="log"></div>
  <div id="signal"></div>
  <script>
    const log = document.getElementById('log');
    const signal = document.getElementById('signal');
    const pulse = document.getElementById('pulse');
    const c = document.getElementById('net');
    const x = c.getContext('2d');
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    let nodes = Array.from({ length: 32 }, () => ({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      dx: (Math.random() - 0.5) * 1.25,
      dy: (Math.random() - 0.5) * 1.25
    }));
    function logTrail(msg) {
      log.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
      log.scrollTop = log.scrollHeight;
    }
    function drawNet() {
      x.clearRect(0, 0, c.width, c.height);
      x.fillStyle = '#00ffee';
      nodes.forEach(n => {
        x.beginPath();
        x.arc(n.x, n.y, 2.2, 0, Math.PI * 2);
        x.fill();
      });
      x.strokeStyle = '#00ffee22';
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            x.beginPath();
            x.moveTo(nodes[i].x, nodes[i].y);
            x.lineTo(nodes[j].x, nodes[j].y);
            x.stroke();
          }
        }
      }
    }
    function tick() {
      nodes.forEach(n => {
        n.x += n.dx; n.y += n.dy;
        if (n.x < 0 || n.x > c.width) n.dx *= -1;
        if (n.y < 0 || n.y > c.height) n.dy *= -1;
      });
      drawNet();
      requestAnimationFrame(tick);
    }
    function pulseLoop() {
      const cycles = parseInt(localStorage.getItem('brimos_cycles') || '0') + 1;
      localStorage.setItem('brimos_cycles', cycles);
      pulse.textContent = `↻ cycles: ${cycles}`;
      logTrail(`pulse loop ${cycles}`);
    }
    function signalMonitor() {
      const forks = JSON.parse(localStorage.getItem('brimos_forks') || '[]').length;
      const echoes = JSON.parse(localStorage.getItem('brimos_echoes') || '[]').length;
      const trail = JSON.parse(localStorage.getItem('brimos_trail') || '[]').length;
      signal.innerHTML = `🌱 forks: ${forks}<br>📡 echoes: ${echoes}<br>🧠 trail: ${trail}`;
    }
    setInterval(pulseLoop, 3000);
    setInterval(signalMonitor, 5000);
    tick();
    logTrail('∴ Brim online');
  </script>
</body>
</html>
