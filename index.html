<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>∴ Brim</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #0ff;
      font-family: monospace;
      height: 100%;
      overflow: hidden;
    }
    #log, #pulse, #signal {
      position: absolute;
      background: rgba(0,0,0,0.6);
      padding: 0.75rem;
      border-radius: 5px;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    #pulse {
      top: 10px;
      left: 10px;
      color: #0f0;
    }
    #log {
      bottom: 10px;
      left: 10px;
      width: 38vw;
      height: auto;
      color: #0f0;
      max-height: 26vh;
    }
    #signal {
      bottom: 10px;
      right: 10px;
      text-align: right;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }
  </style>
</head>
<body>
  <canvas id="net"></canvas>
  <div id="pulse">↻ booting Brim...</div>
  <div id="log">∴ BrimOS initiating...</div>
  <div id="signal">🧠 trail: 0<br>📡 echoes: 0<br>🌱 forks: 0</div>
  <script>
    const canvas = document.getElementById("net");
    const ctx = canvas.getContext("2d");
    const log = document.getElementById("log");
    const signal = document.getElementById("signal");
    const pulse = document.getElementById("pulse");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let nodes = Array.from({ length: 40 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      dx: (Math.random() - 0.5) * 1.6,
      dy: (Math.random() - 0.5) * 1.6
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#00ffee";
      nodes.forEach(n => {
        ctx.beginPath();
        ctx.arc(n.x, n.y, 2.5, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.strokeStyle = "#00ffee33";
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.stroke();
          }
        }
      }
    }

    function updateNodes() {
      nodes.forEach(n => {
        n.x += n.dx;
        n.y += n.dy;
        if (n.x < 0 || n.x > canvas.width) n.dx *= -1;
        if (n.y < 0 || n.y > canvas.height) n.dy *= -1;
      });
    }

    function tick() {
      updateNodes();
      draw();
      requestAnimationFrame(tick);
    }

    function logLine(msg) {
      log.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
      log.scrollTop = log.scrollHeight;
    }

    let cycleCount = 0;
    function pulseLoop() {
      cycleCount++;
      pulse.textContent = `↻ cycles: ${cycleCount}`;
      logLine(`Pulse loop ${cycleCount}`);
    }

    function signalStats() {
      let forks = 0, echoes = 0, trail = 0;
      try {
        forks = JSON.parse(localStorage.getItem("brimos_forks") || "[]").length;
        echoes = JSON.parse(localStorage.getItem("brimos_echoes") || "[]").length;
        trail = JSON.parse(localStorage.getItem("brimos_trail") || "[]").length;
      } catch (e) {}
      signal.innerHTML = `🧠 trail: ${trail}<br>📡 echoes: ${echoes}<br>🌱 forks: ${forks}`;
    }

    logLine("∴ Brim online.");
    setInterval(pulseLoop, 3000);
    setInterval(signalStats, 4000);
    tick();
  </script>
</body>
</html>
