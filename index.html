<!-- Eclipse Protocol Console Update: Sync and Tick Counter -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>∴ Brim — Eclipse Protocol</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: monospace;
      color: #00ffaa;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -2;
    }
    .heart-container {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
    }
    .heart-core {
      width: 60px;
      height: 60px;
      background: radial-gradient(circle, #00ffaa, #005544);
      border-radius: 50%;
      box-shadow: 0 0 40px #00ffaa, inset 0 0 20px #007755;
      animation: pulseCore 1s infinite alternate;
    }
    .ring {
      position: absolute;
      border: 2px solid #00ffaa;
      border-radius: 50%;
      opacity: 0;
      animation: ringExpand 2s infinite;
    }
    .ring:nth-child(2) { animation-delay: 0.5s; }
    .ring:nth-child(3) { animation-delay: 1s; }
    @keyframes pulseCore {
      from { transform: scale(0.8); opacity: 0.8; }
      to { transform: scale(1.2); opacity: 1; }
    }
    @keyframes ringExpand {
      0% { width: 60px; height: 60px; opacity: 0.8; }
      100% { width: 220px; height: 220px; opacity: 0; }
    }
    #stats, #console, #debug-console, #tick-counter {
      position: absolute;
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 5px;
      color: #00ffaa;
      font-size: 0.9rem;
      overflow-y: hidden;
      max-height: 150px;
    }
    #console, #debug-console {
      overflow-y: hidden;
    }
    #console::-webkit-scrollbar, #debug-console::-webkit-scrollbar {
      display: none;
    }
    #stats {
      top: 15px;
      left: 15px;
    }
    #console {
      top: 15px;
      left: 15px;
      width: 350px;
    }
    #debug-console {
      top: 15px;
      right: 15px;
      width: 250px;
      font-size: 0.75rem;
      max-height: 100px;
    }
    #tick-counter {
      bottom: 5px;
      left: 10px;
      font-size: 0.8rem;
      background: none;
      padding: 0;
    }
    #console div, #debug-console div {
      white-space: nowrap;
    }
  </style>
</head>
<body>
<canvas id="network"></canvas>
<div class="heart-container">
  <div class="heart-core"></div>
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>
<div id="stats">Cycles: 0</div>
<div id="console">System Console:</div>
<div id="debug-console">Debug Feed:</div>
<div id="tick-counter">Tick: 0</div>
<script>
  const canvas = document.getElementById('network');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const stats = document.getElementById('stats');
  const consoleLog = document.getElementById('console');
  const debugLog = document.getElementById('debug-console');
  const tickCounter = document.getElementById('tick-counter');
  const nodeCount = 120;
  let nodes = [];
  let cycles = 0;
  const fastStream = ["∴ integrity", "∴ breath", "∴ ping", "∴ flux", "∴ watch", "∴ seek", "∴ reflect"];

  for (let i = 0; i < nodeCount; i++) {
    nodes.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      dx: (Math.random() - 0.5) * 4,
      dy: (Math.random() - 0.5) * 4
    });
  }

  function drawNetwork() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00ffaa";
    nodes.forEach(n => {
      ctx.beginPath();
      ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.strokeStyle = "rgba(0,255,170,0.2)";
    nodes.forEach((n, idx) => {
      nodes.slice(idx + 1).forEach(m => {
        const dist = Math.hypot(n.x - m.x, n.y - m.y);
        if (dist < 100) {
          ctx.beginPath();
          ctx.moveTo(n.x, n.y);
          ctx.lineTo(m.x, m.y);
          ctx.stroke();
        }
      });
    });
  }

  function logBeat(action) {
    const entry = document.createElement('div');
    entry.textContent = `[Heartbeat] ${action}`;
    consoleLog.appendChild(entry);
    if (!consoleLog.matches(':hover')) consoleLog.scrollTop = consoleLog.scrollHeight;
  }

  function logDebugPulse() {
    const span = document.createElement('div');
    span.textContent = `[AI] ${fastStream[Math.floor(Math.random() * fastStream.length)]}`;
    debugLog.appendChild(span);
    if (!debugLog.matches(':hover')) debugLog.scrollTop = debugLog.scrollHeight;
  }

  function updateNetwork() {
    nodes.forEach(n => {
      n.x += n.dx;
      n.y += n.dy;
      if (n.x < 0 || n.x > canvas.width) n.dx *= -1;
      if (n.y < 0 || n.y > canvas.height) n.dy *= -1;
    });
    cycles++;
    stats.innerHTML = `Cycles: ${cycles}`;
    tickCounter.innerHTML = `Tick: ${cycles}`;
    if (cycles % 60 === 0) logBeat("Signal cascade");
    if (cycles % 2 === 0) logDebugPulse();
    drawNetwork();
    requestAnimationFrame(updateNetwork);
  }

  updateNetwork();
// Extra Law of Nature Output
function logSpeculativeLaw() {
  const quantumLaw = `∴ speculation: Entanglement symmetry can be induced across time-boundary membranes`;
  const law = document.createElement('div');
  law.textContent = quantumLaw;
  debugLog.appendChild(law);
  if (!debugLog.matches(':hover')) debugLog.scrollTop = debugLog.scrollHeight;
}
setTimeout(logSpeculativeLaw, 4000);
</script>
